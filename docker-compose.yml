version: 3.8

services:
  redis:
    image: redis:alpine
  
  api-service:
    build: ./api-service
    ports:
      - "8000:8000"
    depends_on:
      - redis
  
  worker-service:
    build: ./worker-service
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - 3000:8000
    depends_on:
      - api-service
