apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: devops

spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service

  template:
    metadata:
      labels:
        app: api-service

    spec:
      containers:
      - name: api
        image: soorajlapasi/api-service:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: devops

spec:
  selector:
    app: api-service
  ports:
    - port: 8000