apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops

spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: soorajlapasi/frontend:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: devops

spec:
  type: NodePort
  selector:
    app: frontend

  ports:
    - port: 8000
      nodePort: 30007