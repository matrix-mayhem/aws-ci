apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: devops

spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service

  template:
    metadata:
      labels:
        app: worker-service

    spec:
      containers:
      - name: worker
        image: soorajlapasi/worker-service:latest